
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Simuladores Marca UPNA</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: #222;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 32px;
        }
        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .simulador-list {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 16px;
            border-radius: 8px;
            background: #f5f5f5;
            transition: box-shadow 0.2s, background 0.2s;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .simulador-list:hover {
            background: #eaeaea;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .simulador-titulo {
            font-size: 1.1rem;
            font-weight: 500;
            margin-right: 12px;
            flex: 1;
        }
        .logo {
            display: block;
            margin: 24px auto 24px auto;
            max-width: 160px;
            width: 60vw;
            border-radius: 8px;
        }
        .imgportada1,
        .imgportada2 {
            width: 70px;
            min-width: 60px;
            max-width: 100px;
            border-radius: 6px;
            margin-left: 10px;
        }
        @media (max-width: 700px) {
            .container {
                max-width: 95vw;
                margin: 16px auto;
                padding: 12px;
            }
            .logo {
                max-width: 120px;
                width: 40vw;
            }
            .simulador-list {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding: 14px 8px;
            }
            .simulador-titulo {
                margin-right: 0;
                font-size: 1rem;
            }
            .imgportada1,
            .imgportada2 {
                width: 60px;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <img src="img/logo_upna.png" class="logo" alt="Logo UPNA">
    <div class="container">
        <h1>SIMULADORES MARCA UPNA</h1>
        <div class="recipe-list">
            <a class="simulador-list" href="puncion_talon.html">
                <span class="simulador-titulo">Simulador Punción Talón</span>
                <img src="img/portada_talon.jpg" class="imgportada1" alt="Portada Talón">
            </a>
            <a class="simulador-list" href="recambio_drenaje_pulmonar.html">
                <span class="simulador-titulo">Recambio Simulador Drenaje Pulmonar</span>
                <img src="img/portada_drenaje.png" class="imgportada2" alt="Portada Drenaje">
            </a>
        </div>
    </div>
</body>
</html>
