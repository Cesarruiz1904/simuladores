
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Simuladores Marca UPNA</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: #222;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 32px;
        }
        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .simulador-list {
            padding: 18px 24px;
            border-radius: 8px;
            background: #f5f5f5;
            transition: box-shadow 0.2s, background 0.2s;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .simulador-list:hover {
            background: #eaeaea;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .simulador-titulo {
            font-size: 1.2rem;
            font-weight: 500;
            position:relative;
            bottom:25px;
        }
        .logo {
            display: block;
            position: relative;
            left: 500px;
            top: 30px;
            margin: 0 auto 24px auto;
            max-width: 100%;
            border-radius: 8px;
            width:200px;
        }
        .imgportada1{
            position: relative;
            left: 235px;
            width: 100px;
        }
        .imgportada2{
            position: relative;
            left: 110px;
            width: 100px;
        }
        .vacio{
            height: 200px;
        }
    </style>
</head>
<body>
    <img src="img/logo_upna.png" class="logo">
    <div class="container">
        <h1>SIMULADORES MARCA UPNA</h1>

        <div class="recipe-list">
            <a class="simulador-list" href="puncion_talon.html">
                <span class="simulador-titulo">Simulador Punción Talón</span>
                <img src="img/portada_talon.jpg" class="imgportada1">
            </a>
            <a class="simulador-list" href="recambio_drenaje_pulmonar.html">
                <span class="simulador-titulo">Recambio Simulador Drenaje Pulmonar</span>
                <img src="img/portada_drenaje.png" class="imgportada2">
            </a>
        </div>


    </div>
</body>
</html>
