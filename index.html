
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Index</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
            color: #222;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 32px;
        }
        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .recipe-card {
            padding: 18px 24px;
            border-radius: 8px;
            background: #f5f5f5;
            transition: box-shadow 0.2s, background 0.2s;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .recipe-card:hover {
            background: #eaeaea;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .recipe-title {
            font-size: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Recipes</h1>
        <div class="recipe-list">
            <a class="recipe-card" href="recipe1.html">
                <span class="recipe-title">Classic Pancakes</span>
            </a>
            <!-- Add more recipes here -->
        </div>
    </div>
</body>
</html>
